# Rendered by matugen to ~/.local/state/caelestia/alacritty-colors.toml
# and imported from alacritty.toml. Same seed as the shell, so the terminal
# palette always matches the desktop.
#
# M3 seed palettes have no true green; ANSI slots map to the nearest role
# (upstream caelestia-cli made the same trade). Verify readability on Arch.

[colors.primary]
background = "{{colors.surface.default.hex}}"
foreground = "{{colors.on_surface.default.hex}}"

[colors.cursor]
text = "{{colors.on_primary.default.hex}}"
cursor = "{{colors.primary.default.hex}}"

[colors.selection]
text = "{{colors.on_secondary_container.default.hex}}"
background = "{{colors.secondary_container.default.hex}}"

[colors.normal]
black = "{{colors.surface_container_high.default.hex}}"
red = "{{colors.error.default.hex}}"
green = "{{colors.tertiary.default.hex}}"
yellow = "{{colors.secondary.default.hex}}"
blue = "{{colors.primary.default.hex}}"
magenta = "{{colors.primary_fixed_dim.default.hex}}"
cyan = "{{colors.tertiary_fixed_dim.default.hex}}"
white = "{{colors.on_surface_variant.default.hex}}"

[colors.bright]
black = "{{colors.outline.default.hex}}"
red = "{{colors.error.default.hex}}"
green = "{{colors.tertiary_fixed.default.hex}}"
yellow = "{{colors.secondary_fixed.default.hex}}"
blue = "{{colors.primary_fixed.default.hex}}"
magenta = "{{colors.primary_fixed.default.hex}}"
cyan = "{{colors.tertiary_fixed.default.hex}}"
white = "{{colors.on_surface.default.hex}}"
